<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050">
    <title>Aulac Corporation - Bunker Pricing Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #1e293b;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        #topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 30px; background: #f8fafc; border-bottom: 3px solid #e2e8f0; flex-shrink: 0; }
        #mode-label { font-size: 18px; font-weight: 800; padding: 6px 20px; border-radius: 50px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); background: #eff6ff; color: #113285; border: 2px solid #bfdbfe; }
        .logo { display: flex; align-items: center; }
        .logo svg { width: 130px; height: auto; }

        /* CONTENT AREA */
        #main-scroll { flex: 1; padding: 10px 30px; display: flex; gap: 20px; overflow: hidden; }
        .panel { background: #ffffff; border-radius: 8px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column; }
        .section-title { font-size: 18px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* TABLE & INPUT */
        .table-wrapper { width: 100%; overflow: auto; border: 1px solid #e2e8f0; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #f8fafc; }
        thead th { padding: 10px; font-size: 12px; font-weight: 800; color: #475569; border-bottom: 2px solid #cbd5e1; }
        tbody td { padding: 8px; border-bottom: 1px solid #e2e8f0; font-size: 14px; font-weight: 600; color: #334155; text-align: center; }
        .calc-input { width: 100%; padding: 8px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 700; }
        
        /* FOOTER */
        #footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 30px; font-size: 15px; font-weight: 600; color: #64748b; background: #f8fafc; border-top: 1px solid #e2e8f0; flex-shrink: 0; }
        #footer-clock { color: #0f172a; font-weight: 700; background: #e2e8f0; padding: 4px 15px; border-radius: 6px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="topbar">
    <div id="mode-label">AULAC CORP - Bunker Calculator</div>
    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="140" height="51" viewBox="0 0 140 51" fill="none">
            <path d="M125.849 9.24637C125.466 9.25371 125.437 9.26105 125.047 9.26473C123.731 10.9165 122.08 12.7225 120.242 14.9102C119.223 16.1105 118.536 16.5363 118.536 20.3207V27.1371C118.543 27.7831 119.069 28.3007 119.716 28.3007C120.102 28.3007 120.448 28.1135 120.661 27.8235L133.36 12.6527C133.558 11.9186 132.992 9.12891 125.849 9.2427" fill="#233F84"></path>
            <path d="M7.56268 31.1308L6.73543 33.4653C6.49277 34.1517 6.11775 35.2162 6.11775 35.9394C6.11775 36.9011 6.73543 37.3489 7.35679 37.8628V37.9656H0.30127V37.8628C1.61016 36.6625 2.05504 35.6641 2.67639 33.9132L7.42297 20.207C7.66563 19.5205 8.18036 18.1808 8.18036 17.4576C8.18036 16.529 7.559 15.9123 6.87147 15.4645V15.3617H15.3021L21.8061 33.0542C22.6333 35.2529 22.8025 36.0421 24.7658 37.8628V37.9656H14.3755V37.8628C15.166 37.3489 15.7874 36.868 15.7874 35.7668C15.7874 35.1832 15.7175 35.0107 15.5116 34.4638L14.3755 31.1308H7.56268ZM10.868 21.1687H10.8312L8.55906 27.9337H13.2394L10.8643 21.1687H10.868Z" fill="#233F84"></path>
            </svg>
    </div>
</div>

<div id="main-scroll">
    <div class="panel flex-[1]">
        <div class="section-title">Bảng Tính Giá Dầu <i class="fa-solid fa-calculator"></i></div>
        </div>
    <div class="panel flex-[2]">
        <div class="section-title">So Sánh Nhà Cung Cấp <i class="fa-solid fa-chart-column"></i></div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>NHÀ CC</th><th>GIÁ</th><th>PHÍ VC</th><th>USD/MT</th></tr>
                </thead>
                <tbody id="supplierTableBody">
                    <tr><td>Nam Côn Sơn</td><td>27.795</td><td>20.000.000</td><td>-</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="footer">
    <span>Aulac Fleet Management System</span>
    <span id="footer-clock"></span>
</div>

<script>
    function updateClock() { 
        const n = new Date(); 
        document.getElementById('footer-clock').textContent = `${String(n.getDate()).padStart(2, '0')}/${String(n.getMonth() + 1).padStart(2, '0')}/${n.getFullYear()} | ${n.toLocaleTimeString('vi-VN')}`; 
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
